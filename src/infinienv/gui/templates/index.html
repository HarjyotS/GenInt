<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>InfiniEnv</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f7f8; --panel: #ffffff; --border: #e2e2e6; --text: #1a1a1e;
    --muted: #6b6b74; --accent: #3b5bfd; --accent-text: #ffffff;
    --ok: #1a9c5f; --err: #d33b3b; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #17171b; --panel: #202024; --border: #333338; --text: #ececee; --muted: #9a9aa2; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  header { padding: 20px 28px; border-bottom: 1px solid var(--border); }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .layout { display: grid; grid-template-columns: 380px 1fr; gap: 0; min-height: calc(100vh - 73px); }
  .panel { padding: 24px; }
  .panel.settings { border-right: 1px solid var(--border); }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 16px 0 6px; text-transform: uppercase; letter-spacing: .03em; }
  label:first-of-type { margin-top: 0; }
  textarea, input[type=text], input[type=number], select {
    width: 100%; padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 14px; font-family: inherit;
  }
  textarea { min-height: 90px; resize: vertical; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 16px; }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; text-transform: none; font-weight: 500; font-size: 13px; color: var(--text); }
  button#generate {
    margin-top: 20px; width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: var(--accent); color: var(--accent-text); font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button#generate:disabled { opacity: .5; cursor: default; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .results { padding: 24px; }
  .log {
    font-family: var(--mono); font-size: 12.5px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; white-space: pre-wrap; min-height: 40px; margin-bottom: 18px;
  }
  .log .line { padding: 2px 0; }
  .banner { padding: 10px 14px; border-radius: 8px; font-weight: 600; margin-bottom: 18px; display: none; }
  .banner.success { background: rgba(26,156,95,.12); color: var(--ok); display: block; }
  .banner.fail { background: rgba(211,59,59,.12); color: var(--err); display: block; }
  .media { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
  .media figure { margin: 0; }
  .media img { width: 100%; border: 1px solid var(--border); border-radius: 8px; display: block; background: var(--panel); }
  .media figcaption { font-size: 12px; color: var(--muted); margin-top: 6px; }
  table.metrics { border-collapse: collapse; font-size: 13px; margin-bottom: 18px; }
  table.metrics td { padding: 4px 10px 4px 0; }
  table.metrics td:first-child { color: var(--muted); }
  details { margin-bottom: 18px; }
  details summary { cursor: pointer; font-size: 13px; color: var(--muted); }
  pre.scene { font-family: var(--mono); font-size: 12px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; overflow: auto; max-height: 360px; }
  .runs { margin-top: 8px; }
  .runs h2 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 10px; }
  .run-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  .run-item { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; background: var(--panel); }
  .run-item img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
  .run-item .name { font-size: 11px; padding: 5px 6px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .run-item .name.ok::before { content: "\2713 "; color: var(--ok); }
  .run-item .name.bad::before { content: "\2717 "; color: var(--err); }
  .empty { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1>InfiniEnv</h1>
  <p>Infinite environment generation via an agent harness — type a prompt, pick your settings, watch it build.</p>
</header>

<div class="layout">
  <div class="panel settings">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Create a museum heist where the agent must find a key, unlock a security door, crack a safe with a stethoscope, and deliver the jewel to the exit."></textarea>

    <label for="provider">Provider</label>
    <select id="provider">
      {% for p in providers %}
      <option value="{{ p }}" {% if p == "mock" %}selected{% endif %}>{{ p }}</option>
      {% endfor %}
    </select>
    <div class="hint">mock needs no API key. openai_agents is the default full runtime.</div>

    <div class="row">
      <div>
        <label for="seed">Seed</label>
        <input type="number" id="seed" value="42">
      </div>
      <div>
        <label for="assets">Assets</label>
        <select id="assets">
          <option value="none" selected>none</option>
          <option value="local">local</option>
          <option value="generated">generated</option>
          <option value="auto">auto</option>
        </select>
      </div>
    </div>

    <label for="max_repair_attempts">Max repair attempts</label>
    <input type="number" id="max_repair_attempts" placeholder="default: 3">

    <label for="out">Output directory</label>
    <input type="text" id="out" placeholder="auto: runs/gui_&lt;timestamp&gt;">

    <div class="checkbox-row">
      <input type="checkbox" id="no_fallback">
      <label for="no_fallback">--no-fallback (error instead of silently using the template)</label>
    </div>

    <button id="generate">Generate</button>

    <div class="runs">
      <h2>Recent runs</h2>
      <div class="run-grid" id="run-grid"><div class="empty">No runs yet.</div></div>
    </div>
  </div>

  <div class="panel results">
    <div class="log" id="log">Configure a run on the left and hit Generate.</div>
    <div class="banner" id="banner"></div>
    <div class="media" id="media" style="display:none">
      <figure><img id="render-img" alt="render.png"><figcaption>render.png</figcaption></figure>
      <figure><img id="replay-img" alt="replay.gif"><figcaption>replay.gif</figcaption></figure>
    </div>
    <table class="metrics" id="metrics-table" style="display:none"></table>
    <details id="scene-details" style="display:none">
      <summary>scene.json</summary>
      <pre class="scene" id="scene-json"></pre>
    </details>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const logEl = $('log'), bannerEl = $('banner'), mediaEl = $('media');
const metricsEl = $('metrics-table'), sceneDetails = $('scene-details'), sceneJson = $('scene-json');
const genBtn = $('generate');

function logLine(text) {
  const div = document.createElement('div');
  div.className = 'line';
  div.textContent = text;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function resetLog() {
  logEl.innerHTML = '';
  bannerEl.style.display = 'none';
  mediaEl.style.display = 'none';
  metricsEl.style.display = 'none';
  sceneDetails.style.display = 'none';
}

async function loadRuns() {
  const res = await fetch('/api/runs');
  const data = await res.json();
  const grid = $('run-grid');
  if (!data.runs.length) { grid.innerHTML = '<div class="empty">No runs yet.</div>'; return; }
  grid.innerHTML = '';
  for (const run of data.runs) {
    const item = document.createElement('div');
    item.className = 'run-item';
    const statusClass = run.success === true ? 'ok' : run.success === false ? 'bad' : '';
    item.innerHTML = `
      <img src="${run.render_url || ''}" onerror="this.style.opacity=0.2" alt="${run.name}">
      <div class="name ${statusClass}">${run.name}</div>`;
    item.onclick = () => showRun(run);
    grid.appendChild(item);
  }
}

function showRun(run) {
  resetLog();
  logLine(`Showing existing run: ${run.name}`);
  if (run.render_url || run.replay_url) {
    mediaEl.style.display = 'grid';
    $('render-img').src = run.render_url || '';
    $('replay-img').src = run.replay_url || '';
  }
}

$('generate').addEventListener('click', async () => {
  const prompt = $('prompt').value.trim();
  if (!prompt) { alert('Enter a prompt first.'); return; }

  resetLog();
  genBtn.disabled = true;
  logLine('Submitting job...');

  const payload = {
    prompt,
    provider: $('provider').value,
    seed: $('seed').value,
    assets: $('assets').value,
    max_repair_attempts: $('max_repair_attempts').value,
    out: $('out').value,
    no_fallback: $('no_fallback').checked,
  };

  let jobId;
  try {
    const res = await fetch('/api/generate', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) { logLine('Error: ' + data.error); genBtn.disabled = false; return; }
    jobId = data.job_id;
  } catch (e) {
    logLine('Request failed: ' + e); genBtn.disabled = false; return;
  }

  const source = new EventSource('/api/stream/' + jobId);
  source.addEventListener('stage', (ev) => {
    const data = JSON.parse(ev.data);
    logLine(data.message);
  });
  source.addEventListener('done', (ev) => {
    const data = JSON.parse(ev.data);
    bannerEl.className = 'banner ' + (data.success ? 'success' : 'fail');
    bannerEl.textContent = data.success ? 'SUCCESS' : 'FAILED (see report.md / errors above)';
    if (data.validation_errors && data.validation_errors.length) {
      for (const err of data.validation_errors) logLine(`  [${err.code}] ${err.message}`);
    }
    mediaEl.style.display = 'grid';
    $('render-img').src = '/artifact/' + data.out_dir + '/render.png?t=' + Date.now();
    $('replay-img').src = '/artifact/' + data.out_dir + '/replay.gif?t=' + Date.now();
    metricsEl.style.display = 'table';
    metricsEl.innerHTML = Object.entries(data.metrics).map(
      ([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`
    ).join('');
    sceneDetails.style.display = 'block';
    sceneJson.textContent = JSON.stringify(data.scene, null, 2);
    source.close();
    genBtn.disabled = false;
    loadRuns();
  });
  source.addEventListener('error', (ev) => {
    let msg = 'connection error';
    try { msg = JSON.parse(ev.data).message; } catch (e) {}
    logLine('Error: ' + msg);
    bannerEl.className = 'banner fail';
    bannerEl.textContent = 'FAILED';
    source.close();
    genBtn.disabled = false;
  });
});

loadRuns();
</script>

</body>
</html>
